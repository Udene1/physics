<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Udene Simulation Sandbox</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #38bdf8;
            --text: #f1f5f9;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        header {
            padding: 1rem 2rem;
            background: var(--card);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--accent);
        }
        .main-container {
            flex: 1;
            display: flex;
            padding: 1rem;
            gap: 1rem;
        }
        .toolbox {
            width: 250px;
            background: var(--card);
            border-radius: 10px;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .canvas-area {
            flex: 1;
            background: #111;
            border-radius: 10px;
            position: relative;
            overflow: hidden;
            border: 1px dashed #444;
        }
        .component {
            background: #334155;
            padding: 0.8rem;
            border-radius: 5px;
            cursor: grab;
            user-select: none;
            text-align: center;
            border: 1px solid #475569;
        }
        .component:hover {
            border-color: var(--accent);
        }
        .btn {
            background: var(--accent);
            color: var(--bg);
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        #sim-canvas {
            width: 100%;
            height: 100%;
        }
        .info-panel {
            position: absolute;
            bottom: 1rem;
            right: 1rem;
            background: rgba(30, 41, 59, 0.9);
            padding: 1rem;
            border-radius: 10px;
            max-width: 300px;
        }
    </style>
</head>
<body>
    <header>
        <h1>🔬 Udene Logic Sandbox</h1>
        <div>
            <button class="btn" onclick="runSim()">▶ Test Circuit</button>
            <button class="btn" onclick="window.location.href='/'" style="background: #64748b;">Back to Chat</button>
        </div>
    </header>

    <div class="main-container">
        <div class="toolbox">
            <h3>🧩 Components</h3>
            <div class="component" draggable="true" data-type="battery">🔋 9V Battery</div>
            <div class="component" draggable="true" data-type="led">💡 LED</div>
            <div class="component" draggable="true" data-type="resistor">🏷️ 220Ω Resistor</div>
            <div class="component" draggable="true" data-type="switch">🔘 Toggle Switch</div>
            <div class="component" draggable="true" data-type="motor">⚙️ DC Motor</div>
            <hr>
            <p><small>Drag components onto the board to build your prototype!</small></p>
        </div>

        <div class="canvas-area" id="drop-zone">
            <canvas id="sim-canvas"></canvas>
            <div class="info-panel">
                <h4>System Status</h4>
                <div id="status">Ready. Select a component to begin.</div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('sim-canvas');
        const ctx = canvas.getContext('2d');
        let elements = [];

        function resize() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
            draw();
        }
        window.addEventListener('resize', resize);
        resize();

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // Draw grid
            ctx.strokeStyle = '#222';
            for(let x=0; x<canvas.width; x+=50) {
                ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x, canvas.height); ctx.stroke();
            }
            for(let y=0; y<canvas.height; y+=50) {
                ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(canvas.width, y); ctx.stroke();
            }

            elements.forEach(el => {
                ctx.fillStyle = '#38bdf8';
                ctx.fillRect(el.x, el.y, 80, 50);
                ctx.fillStyle = '#000';
                ctx.font = '12px Arial';
                ctx.fillText(el.type, el.x + 5, el.y + 30);
            });
        }

        const dropZone = document.getElementById('drop-zone');
        dropZone.addEventListener('dragover', e => e.preventDefault());
        dropZone.addEventListener('drop', e => {
            const type = e.dataTransfer.getData('text/plain');
            const rect = canvas.getBoundingClientRect();
            elements.push({
                type: type,
                x: e.clientX - rect.left - 40,
                y: e.clientY - rect.top - 25
            });
            draw();
        });

        document.querySelectorAll('.component').forEach(comp => {
            comp.addEventListener('dragstart', e => {
                e.dataTransfer.setData('text/plain', comp.dataset.type);
            });
        });

        function runSim() {
            const status = document.getElementById('status');
            if (elements.length < 2) {
                status.innerText = "⚠️ Missing connections. Need at least a power source and a load.";
                return;
            }
            // Simple logic check
            const hasPower = elements.some(e => e.type === 'battery');
            const hasLoad = elements.some(e => e.type === 'led' || e.type === 'motor');
            const hasResistor = elements.some(e => e.type === 'resistor');

            if (hasPower && hasLoad) {
                if (elements.some(e => e.type === 'led') && !hasResistor) {
                    status.innerHTML = "💥 <span style='color:#f87171'>POOF! The LED burned out. You forgot a current-limiting resistor!</span>";
                } else {
                    status.innerHTML = "🚀 <span style='color:#4ade80'>CRUISE CONTROL! The circuit is working perfectly.</span>";
                }
            } else {
                status.innerText = "The circuit is incomplete. Ensure you have a battery and a device connected.";
            }
        }
    </script>
</body>
</html>
